<!DOCTYPE html>
<html lang="pl" data-lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline · NorthPeak Studio</title>
<meta name="theme-color" content="#0a1612" />
<link rel="icon" type="image/png" href="/assets/pwa/favicon-32.png" />
<style>
  :root {
    --bg: #0a1612;
    --bg-2: #11221c;
    --ink: #f4ecd8;
    --ink-2: #c4baa0;
    --ink-3: #8a8970;
    --accent: #f5b690;
    --cyan: #6dbb95;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    display: grid;
    place-items: center;
    padding: 2rem;
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-top: max(2rem, env(safe-area-inset-top));
    background:
      radial-gradient(ellipse 70% 50% at 12% 20%, rgba(245, 182, 144, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 88% 80%, rgba(109, 187, 149, 0.07) 0%, transparent 65%),
      var(--bg);
  }
  .panel {
    max-width: 480px;
    text-align: center;
  }
  .mark {
    width: 76px; height: 56px;
    margin: 0 auto 1.4rem;
    color: var(--ink);
    opacity: 0.92;
  }
  .mark svg { width: 100%; height: 100%; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.55rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.66rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1.2rem;
  }
  .badge::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(109, 187, 149, 0.7);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  h1 {
    font-family: 'Playfair Display', 'Instrument Serif', Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    line-height: 1.15;
    margin: 0 0 1rem;
    letter-spacing: -0.01em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  p {
    color: var(--ink-2);
    font-size: 1rem;
    line-height: 1.55;
    margin: 0 0 2rem;
    max-width: 36ch;
    margin-left: auto;
    margin-right: auto;
  }
  .actions {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    appearance: none;
    border: 1px solid var(--ink-2);
    background: transparent;
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.74rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.85rem 1.4rem;
    border-radius: 999px;
    cursor: pointer;
    min-height: 48px;
    transition: all 280ms cubic-bezier(.2,.8,.2,1);
  }
  button.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  button:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  button.primary:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .footer {
    margin-top: 3rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  /* Pine silhouette at bottom — same as main site */
  .mist {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 18vh;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200' preserveAspectRatio='none'><path d='M0 200 L40 130 L60 160 L80 100 L110 150 L130 90 L160 140 L190 70 L220 130 L260 60 L290 120 L330 50 L360 110 L400 40 L430 105 L470 50 L500 110 L540 60 L580 100 L620 50 L660 110 L700 60 L750 110 L790 70 L830 120 L870 80 L920 130 L960 70 L1000 130 L1040 90 L1080 130 L1120 80 L1160 130 L1200 100 L1200 200 Z' fill='%230a1612' opacity='0.55'/></svg>");
    background-size: 100% 100%;
    background-position: bottom center;
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="mist"></div>
  <div class="panel">
    <div class="mark">
      <svg viewBox="0 0 100 60" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 55 L30 25 L45 40 L60 15 L75 35 L95 5"/>
      </svg>
    </div>
    <span class="badge">Status · offline</span>
    <h1>Brak połączenia,<br/><em>cisza w studiu.</em></h1>
    <p>Sprawdź swoje Wi-Fi lub dane mobilne. NorthPeak wraca, gdy tylko będziesz miał sygnał.</p>
    <div class="actions">
      <button type="button" class="primary" onclick="location.reload()">Spróbuj ponownie</button>
      <button type="button" onclick="history.back()">Wróć</button>
    </div>
    <div class="footer">NORTHPEAK · STUDIO</div>
  </div>
  <script>
    // Auto-reload when connection restored
    window.addEventListener('online', () => setTimeout(() => location.reload(), 600));
  </script>
</body>
</html>
